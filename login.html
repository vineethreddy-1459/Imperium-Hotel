<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),url("images/hotel-bg.jpg");
    background-size:cover;
    background-position:center;
}

.container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#003366;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0055aa;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#003366;
    text-decoration:none;
    font-weight:bold;
}
